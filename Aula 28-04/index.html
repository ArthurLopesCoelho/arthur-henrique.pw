<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Calculadora</title>
</head>
<script src="js/calculo.js"></script>
<body>
    <h1>Minha Calculadora</h1>
    Primeiro Número(Base do triangulo) <br>
    <input type="number" id="n1"><br>
    Segundo Número(Altura do triangulo) <br>
    <input type="number" id="n2"> <br> <br>
    <button onclick="somar()">Somar</button>
    <button onclick="subtrair()">Subtrair</button>
    <button onclick="multiplicar()">Multiplicar</button>
    <button onclick="dividir()">Dividir</button>
    <button onclick="triangulo()">Triângulo</button>
    <button onclick="quadrado()">Quadrado</button>
    <br>
    O resultado é <span id="resultado"></span>
    

    <h1>Verificação de Idade</h1>
    Digite sua Idade<br>
    <input type="number" id="idade"><br>
    <button onclick="verificar()">Verificar</button>
    <br>Você é <span id="idade_resultado"><br>

<script src="js/calculo.js"></script>
</body>
</html>
